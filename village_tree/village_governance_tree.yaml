# Minimal governance prototype for a small village.
# Every need from village_needs_catalog.yaml is satisfied or required somewhere.
# Canonical authoring structure uses a normalized governance-node registry so
# households, neighbor groups, wards, and future intermediate layers can change
# without rewriting the code architecture.

version: '1.1'
scope: 90% self-sufficient village
completeness: all 65 needs covered
root_node: village
nodes:
- id: village
  name: Village
  type: V
  parent_id: null
  child_ids:
  - ward_1
  - ward_2
  status: active
  meta:
    satisfies:
    - food.market.haat
    - food.market.shop
    - food.storage.cold
    - food.processing.mill
    - food.nutrition.schoolmeal
